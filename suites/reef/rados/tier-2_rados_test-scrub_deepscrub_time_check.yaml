# Suite contains  tier-3 rados bug verification automation
#===============================================================================================
#------------------------------------------------------------------------------------------
#----- Tier-3 - Reproducing the Bug-2330755 verification   automation   ------
#------------------------------------------------------------------------------------------
# Conf: conf/reef/rados/7-node-cluster.yaml
# Bugs:Bug 2330755 - Scrub/deep scrub taking too long under mclock I/O scheduler
#
#===============================================================================================
tests:
  - test:
      name: setup install pre-requisistes
      desc: Setup phase to deploy the required pre-requisites for running the tests.
      module: install_prereq.py
      abort-on-fail: true

  - test:
      name: cluster deployment
      desc: Execute the cluster deployment workflow.
      module: test_cephadm.py
      polarion-id:
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                rhcs-version: 7.1
                release: z2
                mon-ip: node1
                orphan-initial-daemons: true
                skip-monitoring-stack: true
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr
          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
          - config:
              command: shell
              args:          # arguments to ceph orch
                - ceph
                - fs
                - volume
                - create
                - cephfs
          - config:
              command: apply
              service: rgw
              pos_args:
                - rgw.1
              args:
                placement:
                  label: rgw
          - config:
              command: apply
              service: mds
              base_cmd_args:          # arguments to ceph orch
                verbose: true
              pos_args:
                - cephfs              # name of the filesystem
              args:
                placement:
                  nodes:
                    - node2
                    - node6
                  limit: 2            # no of daemons
                  sep: " "            # separator to be used for placements
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Configure client admin
      desc: Configures client admin node on cluster
      module: test_client.py
      polarion-id:
      config:
        command: add
        id: client.1                      # client Id (<type>.<Id>)
        node: node7                       # client node
        install_packages:
          - ceph-common
        copy_admin_keyring: true          # Copy admin keyring to node
        caps:                             # authorize client capabilities
          mon: "allow *"
          osd: "allow *"
          mds: "allow *"
          mgr: "allow *"

  - test:
      name: Enable logging to file
      module: rados_prep.py
      config:
        log_to_file: true
      desc: Change config options to enable logging to file

  - test:
      name: Reproducing the bug that taking too long to deep-scrub
      desc: BZ#2330755-deep scrub taking too long under mclock I/O scheduler
      module: test_scrub_deepscrub_timecheck.py
      polarion-id: CEPH-83605026
      config:
        pool_name: scrub_pool
        pg_num: 1
        disable_pg_autoscale: true
      delete_pool:
        - scrub_pool
  - test:
      name: Upgrade cluster to latest 7.x ceph version
      desc: Upgrade cluster to latest version
      module: test_cephadm_upgrade.py
      polarion-id: CEPH-83573791,CEPH-83573790
      config:
        command: start
        service: upgrade
        base_cmd_args:
          verbose: true
        verify_cluster_health: true
      destroy-cluster: false
      abort-on-fail: true
  - test:
      name: Verification of the scrub and deep-scrub time check
      desc: BZ#2330755-deep scrub taking too long under mclock I/O scheduler
      module: test_scrub_deepscrub_timecheck.py
      polarion-id: CEPH-83605026
      config:
        pool_name: scrub_pool
        pg_num: 1
        disable_pg_autoscale: true
      delete_pool:
        - scrub_pool


